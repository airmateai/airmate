<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Panel Airmate</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --pri:#0c1e3d; --acc:#22c55e; --acc2:#16a34a;
  --bg:#f0f4f8; --white:#fff; --border:#e2e8f0;
  --txt:#0f172a; --gray:#64748b; --rad:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);}

/* ── LOGIN ── */
#login-screen{
  min-height:100vh;background:linear-gradient(135deg,var(--pri) 0%,#1a3560 100%);
  display:flex;align-items:center;justify-content:center;
}
.login-box{background:#fff;border-radius:20px;padding:48px 40px;width:360px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.25);}
.login-logo{width:52px;height:52px;background:var(--acc);border-radius:14px;margin:0 auto 20px;display:grid;place-items:center;font-size:26px;}
.login-box h2{font-size:22px;font-weight:800;margin-bottom:6px;}
.login-box p{color:var(--gray);font-size:14px;margin-bottom:28px;}
.login-box input{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;font-family:inherit;outline:none;margin-bottom:14px;
}
.login-box input:focus{border-color:var(--acc);}
.login-box button{
  width:100%;padding:13px;background:var(--acc);color:#fff;border:none;
  border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;
}
.login-box button:hover{background:var(--acc2);}
.login-box button:disabled{opacity:.6;cursor:not-allowed;}
#login-err{color:#dc2626;font-size:13px;margin-top:10px;display:none;}

/* ── LAYOUT ── */
#app{display:none;min-height:100vh;flex-direction:column;}
.topbar{background:var(--pri);height:58px;display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:50;}
.topbar-logo{color:#fff;font-weight:800;font-size:16px;display:flex;align-items:center;gap:8px;}
.topbar-dot{width:28px;height:28px;background:var(--acc);border-radius:8px;display:grid;place-items:center;font-size:14px;}
#biz-title{color:rgba(255,255,255,.6);font-size:13px;margin-right:auto;}
.topbar-refresh{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.7);padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;}
.topbar-refresh:hover{background:rgba(255,255,255,.18);color:#fff;}
.topbar-logout{background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.5);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;}
.topbar-logout:hover{color:#fff;}

.tabs-bar{background:var(--white);border-bottom:1px solid var(--border);display:flex;padding:0 24px;}
.tab-btn{padding:14px 20px;font-size:14px;font-weight:600;color:var(--gray);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.tab-btn.active{color:var(--pri);border-bottom-color:var(--acc);}
.tab-btn:hover:not(.active){color:var(--txt);}
.badge{background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;}

.content{padding:24px;max-width:1200px;margin:0 auto;width:100%;}
.tab-pane{display:none;} .tab-pane.active{display:block;}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{background:var(--white);border-radius:var(--rad);padding:20px;border:1px solid var(--border);}
.stat-label{font-size:12px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.stat-val{font-size:28px;font-weight:800;}
.stat-sub{font-size:12px;color:var(--gray);margin-top:4px;}

/* ── CARDS ── */
.panel-card{background:var(--white);border-radius:var(--rad);border:1px solid var(--border);overflow:hidden;margin-bottom:20px;}
.panel-card-hd{padding:16px 20px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:space-between;}
.btn-sm{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;}
.btn-acc{background:var(--acc);color:#fff;} .btn-acc:hover{background:var(--acc2);}
.btn-ghost{background:var(--bg);color:var(--txt);border:1px solid var(--border);} .btn-ghost:hover{background:var(--border);}
.btn-danger{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;} .btn-danger:hover{background:#fee2e2;}

/* ── TABLA CITAS ── */
.citas-controls{padding:16px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);}
.citas-controls input{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;}
.citas-controls input:focus{border-color:var(--acc);}
.date-nav{display:flex;align-items:center;gap:8px;}
.date-nav button{background:var(--bg);border:1px solid var(--border);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px;}
#citas-date-label{font-weight:700;font-size:14px;min-width:140px;text-align:center;}

table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;text-align:left;font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;background:#f8fafc;border-bottom:1px solid var(--border);}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafbfc;}

.badge-status{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;}
.s-pending{background:#fef9c3;color:#854d0e;}
.s-confirmed{background:#dcfce7;color:#166534;}
.s-cancelled{background:#fee2e2;color:#991b1b;}
.s-completed{background:#dbeafe;color:#1e40af;}
.s-new{background:#e0f2fe;color:#0369a1;}
.s-contacted{background:#fef3c7;color:#92400e;}
.s-qualified{background:#d1fae5;color:#065f46;}
.s-converted{background:#dcfce7;color:#14532d;}
.s-lost{background:#fee2e2;color:#991b1b;}
.intent-hot{color:#dc2626;font-weight:700;}
.intent-warm{color:#f59e0b;font-weight:700;}
.intent-cold{color:#64748b;font-weight:600;}

/* ── CALENDAR ── */
.cal-wrap{display:flex;overflow-x:auto;}
.hour-col{width:56px;flex-shrink:0;padding-top:30px;}
.hour-lbl{height:60px;display:flex;align-items:flex-start;padding-top:2px;font-size:11px;color:var(--gray);padding-left:8px;}
.day-col{flex:1;min-width:90px;position:relative;}
.day-hd{height:30px;font-size:12px;font-weight:700;padding:6px 4px;background:#f8fafc;border-bottom:1px solid var(--border);border-left:1px solid var(--border);text-align:center;}
.day-hd.today-hd{background:#dcfce7;color:var(--acc2);}
.grid-body{position:relative;}
.grid-row{height:60px;border-bottom:1px solid #f1f5f9;border-left:1px solid var(--border);}
.grid-row:nth-child(even){background:#fafbfc;}
.now-line{position:absolute;left:0;right:0;height:2px;background:#ef4444;z-index:3;pointer-events:none;}
.now-line::before{content:'';width:8px;height:8px;background:#ef4444;border-radius:50%;position:absolute;left:-4px;top:-3px;}
.appt-block{position:absolute;left:2px;right:2px;border-radius:6px;padding:3px 6px;font-size:11px;font-weight:600;cursor:pointer;z-index:2;overflow:hidden;transition:.15s;border-left:3px solid rgba(0,0,0,.15);}
.appt-block:hover{opacity:.85;}
.appt-block .appt-name{font-weight:700;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.appt-block .appt-svc{font-size:10px;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.appt-block .appt-hour{font-size:10px;opacity:.7;}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:12px;}
.month-dow{text-align:center;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;padding:4px 0 8px;}
.month-cell{min-height:70px;border-radius:8px;padding:6px;background:#f8fafc;cursor:pointer;transition:.1s;position:relative;}
.month-cell:hover{background:#f1f5f9;}
.month-cell.other-month{opacity:.35;}
.month-cell.today-cell{background:#dcfce7;border:1.5px solid var(--acc);}
.month-num{font-size:13px;font-weight:700;margin-bottom:4px;}
.month-appt-pill{font-size:10px;font-weight:600;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}

/* ── LEADS PIPELINE ── */
.pipeline{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;}
.pipe-col{min-width:200px;flex:1;background:#f8fafc;border-radius:var(--rad);padding:14px;}
.pipe-col-hd{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.pipe-count{background:rgba(0,0,0,.08);padding:2px 8px;border-radius:20px;font-size:12px;}
.lead-card{background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border);cursor:pointer;transition:.15s;}
.lead-card:hover{border-color:var(--acc);box-shadow:0 2px 8px rgba(34,197,94,.12);}
.lead-card-name{font-weight:700;font-size:13px;margin-bottom:4px;}
.lead-card-svc{font-size:12px;color:var(--gray);margin-bottom:6px;}
.lead-card-foot{display:flex;align-items:center;justify-content:space-between;font-size:11px;}

/* ── MODAL ── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
#modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2);}
.modal-hd{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-hd h3{font-size:17px;font-weight:700;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);line-height:1;}
.modal-body{padding:24px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.modal-field label{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;}
.modal-field p{font-size:14px;font-weight:500;}
.modal-field.full{grid-column:1/-1;}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;resize:vertical;}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{border-color:var(--acc);}
.modal-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
.modal-section{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.modal-section h4{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;}
.conv-box{background:#f8fafc;border-radius:8px;padding:12px;font-size:13px;line-height:1.6;max-height:120px;overflow-y:auto;color:var(--gray);}

.alert-card{background:#fff7ed;border:1.5px solid #fed7aa;border-radius:var(--rad);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.alert-card .alert-icon{font-size:22px;}
.alert-card .alert-txt{font-size:14px;font-weight:600;color:#9a3412;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--pri);color:#fff;padding:10px 22px;border-radius:10px;font-size:14px;font-weight:600;z-index:1000;transition:.3s;opacity:0;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

@media(max-width:640px){
  .modal-grid{grid-template-columns:1fr;}
  .pipeline{flex-direction:column;}
  .pipe-col{min-width:unset;}
  .stats-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">✦</div>
    <h2>Panel Airmate</h2>
    <p>Entra con tu email y contraseña</p>
    <input type="email" id="login-email" placeholder="tu@email.com" onkeydown="if(event.key==='Enter')doLogin()">
    <input type="password" id="login-pass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    <button id="login-btn" onclick="doLogin()">Entrar →</button>
    <div id="login-err">Email o contraseña incorrectos</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-dot">✦</div>
      <span>Airmate</span>
    </div>
    <span id="biz-title"></span>
    <button class="topbar-refresh" onclick="loadAll()">↻ Actualizar</button>
    <button class="topbar-logout" onclick="doLogout()">Salir</button>
  </div>

  <div class="tabs-bar">
    <button class="tab-btn active" onclick="showTab('dashboard')">📊 Dashboard</button>
    <button class="tab-btn" onclick="showTab('citas')" id="tab-citas">📅 Citas</button>
    <button class="tab-btn" onclick="showTab('leads')" id="tab-leads">🎯 Leads</button>
    <button class="tab-btn" onclick="showTab('seguimientos')" id="tab-seg">⏰ Seguimientos</button>
  </div>

  <div class="content">
    <div id="pane-dashboard" class="tab-pane active">
      <div class="stats-grid" id="stats-grid"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;" id="dash-panels"></div>
    </div>
    <div id="pane-citas" class="tab-pane">
      <div class="panel-card">
        <div class="citas-controls">
          <div class="date-nav">
            <button onclick="navBack()">‹</button>
            <span id="citas-date-label"></span>
            <button onclick="navFwd()">›</button>
            <button class="btn-sm btn-ghost" onclick="goToday()" style="margin-left:4px;">Hoy</button>
          </div>
          <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;">
            <button class="btn-sm btn-ghost" id="btn-day"  onclick="setCitasView('day')">Día</button>
            <button class="btn-sm btn-ghost" id="btn-week" onclick="setCitasView('week')">Semana</button>
            <button class="btn-sm btn-ghost" id="btn-month"onclick="setCitasView('month')">Mes</button>
            <button class="btn-sm btn-ghost" id="btn-list" onclick="setCitasView('list')">☰ Lista</button>
          </div>
        </div>
        <div id="citas-view"></div>
      </div>
    </div>
    <div id="pane-leads" class="tab-pane">
      <div class="panel-card" style="margin-bottom:16px;">
        <div class="citas-controls">
          <input type="text" id="leads-search" placeholder="🔍  Buscar..." oninput="renderLeads()" style="flex:1;min-width:200px;">
          <select id="leads-intent" onchange="renderLeads()" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;">
            <option value="">Todos los niveles</option>
            <option value="hot">🔥 Caliente</option>
            <option value="warm">🌡️ Tibio</option>
            <option value="cold">❄️ Frío</option>
          </select>
          <select id="leads-status" onchange="renderLeads()" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;">
            <option value="">Todos los estados</option>
            <option value="new">Nuevo</option>
            <option value="contacted">Contactado</option>
            <option value="qualified">Cualificado</option>
            <option value="converted">Convertido</option>
            <option value="lost">Perdido</option>
          </select>
          <button class="btn-sm" id="btn-pipeline" onclick="setLeadsView('pipeline')" style="background:var(--acc);color:#fff;border:none;">⬛ Pipeline</button>
          <button class="btn-sm btn-ghost" id="btn-tabla" onclick="setLeadsView('tabla')">☰ Tabla</button>
        </div>
      </div>
      <div id="leads-view"></div>
    </div>
    <div id="pane-seguimientos" class="tab-pane">
      <div id="seg-view"></div>
    </div>
  </div>
</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-box"></div>
</div>
<div id="toast"></div>

<script>
const SB_URL = 'https://vjofxmfwdybktpwiuanc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqb2Z4bWZ3ZHlia3Rwd2l1YW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzU5NDYsImV4cCI6MjA5MDA1MTk0Nn0.ixU-33c0FEkO7F5xjWb3YHkvj_pQuR0gsJETrGA8ZTE';
const _sb = supabase.createClient(SB_URL, SB_KEY);

let BIZ_SLUG = '', BIZ_NAME = '';
let allCitas = [], allLeads = [];
let citasDate = new Date(); citasDate.setHours(0,0,0,0);
let citasView = 'week', leadsView = 'pipeline';
let prevHotCount = -1, prevPendingCount = -1;
const SESSION_KEY = 'airmate_panel_session';

const SVC_COLORS = ['#6366f1','#8b5cf6','#ec4899','#f59e0b','#0ea5e9','#22c55e'];
function svcColor(name){ let h=0; for(let c of (name||'')) h=(h*31+c.charCodeAt(0))&0xffff; return SVC_COLORS[h%SVC_COLORS.length]; }

// ── LOGIN ─────────────────────────────────────────────────
async function doLogin(){
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-err');
  const btn   = document.getElementById('login-btn');
  err.style.display = 'none';
  if (!email || !pass) { err.textContent='Rellena email y contraseña'; err.style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'Entrando…';
  try {
    const { data, error } = await _sb.from('clients').select('*').eq('email', email).eq('password', pass).single();
    if (error || !data) { err.textContent='Email o contraseña incorrectos'; err.style.display='block'; return; }
    /* Obtener slug del negocio */
    const { data: cfg } = await _sb.from('bot_configs').select('slug, bot_name').eq('client_id', data.id).single();
    BIZ_SLUG = cfg?.slug || data.name?.toLowerCase().replace(/\s+/g,'-') || 'mi-negocio';
    BIZ_NAME = cfg?.bot_name || data.name || 'Mi Negocio';
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ email, pass, slug: BIZ_SLUG, name: BIZ_NAME }));
    enterApp();
  } catch(e) {
    err.textContent = 'Error de conexión. Inténtalo de nuevo.';
    err.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar →';
  }
}

function doLogout(){
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
}

function enterApp(){
  document.getElementById('login-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex'; app.style.flexDirection = 'column';
  document.getElementById('biz-title').textContent = BIZ_NAME;
  document.title = 'Panel · ' + BIZ_NAME;
  loadAll();
  setInterval(loadAll, 30000);
  setCitasView('week');
}

/* Restaurar sesión */
const saved = sessionStorage.getItem(SESSION_KEY);
if (saved) {
  try {
    const s = JSON.parse(saved);
    BIZ_SLUG = s.slug; BIZ_NAME = s.name;
    enterApp();
  } catch(e) { sessionStorage.removeItem(SESSION_KEY); }
}

// ── DATOS ─────────────────────────────────────────────────
async function loadAll(){
  const [c,l] = await Promise.all([
    _sb.from('appointments').select('*').eq('business_slug',BIZ_SLUG).order('starts_at',{ascending:true}),
    _sb.from('leads').select('*').eq('business_slug',BIZ_SLUG).order('created_at',{ascending:false})
  ]);
  allCitas = c.data||[]; allLeads = l.data||[];
  renderActive(); checkNotifications();
}

function renderActive(){
  renderDashboard();
  const active = document.querySelector('.tab-btn.active')?.textContent?.trim();
  if(document.getElementById('pane-citas').classList.contains('active')) renderCitas();
  if(document.getElementById('pane-leads').classList.contains('active')) renderLeads();
  if(document.getElementById('pane-seguimientos').classList.contains('active')) renderSeguimientos();
  updateBadges();
}

// ── TABS ──────────────────────────────────────────────────
function showTab(id){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('pane-'+id).classList.add('active');
  if(id==='citas') renderCitas();
  if(id==='leads') renderLeads();
  if(id==='seguimientos') renderSeguimientos();
}

function updateBadges(){
  const hot = allLeads.filter(l=>l.intent_level==='hot'&&l.status==='new').length;
  const today = localDateStr(new Date());
  const venc = allLeads.filter(l=>l.follow_up_date&&l.follow_up_date<=today).length;
  const pend = allCitas.filter(c=>c.status==='pending').length;
  document.getElementById('tab-citas').innerHTML = `📅 Citas${pend?` <span class="badge">${pend}</span>`:''}`;

function showTabById(id){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  const btn = document.getElementById('tab-'+id);
  if(btn) btn.classList.add('active');
  document.getElementById('pane-'+id).classList.add('active');
  if(id==='citas') renderCitas();
  if(id==='leads') renderLeads();
}

function stat(em,lbl,val,sub,style=''){
  return `<div class="stat-card"><div class="stat-label">${em} ${lbl}</div><div class="stat-val" style="${style}">${val}</div><div class="stat-sub">${sub}</div></div>`;
}

// ── CITAS ─────────────────────────────────────────────────
function localDateStr(d){const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;}
function apptLocalDate(iso){if(!iso)return '';return localDateStr(new Date(iso));}

function navBack(){
  if(citasView==='month'){citasDate.setMonth(citasDate.getMonth()-1);}
  else if(citasView==='week'){citasDate.setDate(citasDate.getDate()-7);}
  else{citasDate.setDate(citasDate.getDate()-1);}
  renderCitas();
}
function navFwd(){
  if(citasView==='month'){citasDate.setMonth(citasDate.getMonth()+1);}
  else if(citasView==='week'){citasDate.setDate(citasDate.getDate()+7);}
  else{citasDate.setDate(citasDate.getDate()+1);}
  renderCitas();
}
function goToday(){citasDate=new Date();citasDate.setHours(0,0,0,0);renderCitas();}
function setCitasView(v){
  citasView=v;
  ['day','week','month','list'].forEach(x=>{
    const b=document.getElementById('btn-'+x);
    if(b) b.className=x===v?'btn-sm btn-acc':'btn-sm btn-ghost';
  });
  renderCitas();
}

function renderCitas(){
  const todayStr=localDateStr(new Date());
  const ds=localDateStr(citasDate);
  if(citasView==='month'){
    document.getElementById('citas-date-label').textContent=citasDate.toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  } else if(citasView==='week'){
    const mon=new Date(citasDate); mon.setDate(mon.getDate()-((mon.getDay()+6)%7));
    const sun=new Date(mon); sun.setDate(sun.getDate()+6);
    document.getElementById('citas-date-label').textContent=mon.toLocaleDateString('es-ES',{day:'numeric',month:'short'})+' – '+sun.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
  } else {
    document.getElementById('citas-date-label').textContent=citasDate.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  }

  if(citasView==='list'){
    const futureCitas=allCitas.filter(c=>apptLocalDate(c.starts_at)>=todayStr&&c.status!=='cancelled').sort((a,b)=>new Date(a.starts_at)-new Date(b.starts_at));
    document.getElementById('citas-view').innerHTML=futureCitas.length?`
      <table><thead><tr><th>Cliente</th><th>Servicio</th><th>Fecha y hora</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>${futureCitas.map(c=>`
        <tr>
          <td><strong>${c.client_name||'—'}</strong><br><span style="font-size:12px;color:var(--gray);">${c.client_phone||'—'}</span></td>
          <td><span style="color:${svcColor(c.service)};font-weight:600;">●</span> ${c.service||'—'}</td>
          <td>${fmtDateTime(c.starts_at)}</td>
          <td><span class="badge-status s-${c.status}">${statusCita(c.status)}</span></td>
          <td style="display:flex;gap:6px;">
            <button class="btn-sm btn-acc" onclick="quickCita('${c.id}','confirmed')">✓</button>
            <button class="btn-sm btn-danger" onclick="quickCita('${c.id}','cancelled')">✕</button>
            <button class="btn-sm btn-ghost" onclick="openCitaModal('${c.id}')">Ver</button>
          </td>
        </tr>`).join('')}
      </tbody></table>`:`<div style="padding:32px;text-align:center;color:var(--gray);">No hay citas próximas</div>`;
    return;
  }
  if(citasView==='month'){renderMonthView(todayStr);return;}

  const DAY_START=8,DAY_END=21,HOUR_H=60;
  let labels='',rows='';
  for(let h=DAY_START;h<DAY_END;h++){labels+=`<div class="hour-lbl">${String(h).padStart(2,'0')}:00</div>`;rows+=`<div class="grid-row"></div>`;}
  const gridH=(DAY_END-DAY_START)*HOUR_H;
  const makeDayBlocks=(dStr,isToday)=>{
    const dayCitas=allCitas.filter(c=>apptLocalDate(c.starts_at)===dStr);
    let blocks=dayCitas.map(c=>{
      if(!c.starts_at)return '';
      const s=new Date(c.starts_at),e=c.ends_at?new Date(c.ends_at):new Date(s.getTime()+3600000);
      const top=(s.getHours()+s.getMinutes()/60-DAY_START)*HOUR_H;
      const h2=(e-s)/3600000*HOUR_H;
      const col=svcColor(c.service);
      return `<div class="appt-block" style="top:${top}px;height:${Math.max(h2,24)}px;background:${col}22;color:${col};border-left-color:${col};" onclick="openCitaModal('${c.id}')">
        <div class="appt-name">${c.client_name||'Sin nombre'}</div>
        <div class="appt-svc">${c.service||''}</div>
        <div class="appt-hour">${fmtTime(c.starts_at)}</div>
      </div>`;
    }).join('');
    let nowLine='';
    if(isToday){const n=new Date();const top=(n.getHours()+n.getMinutes()/60-DAY_START)*HOUR_H;if(top>=0)nowLine=`<div class="now-line" style="top:${top}px;"></div>`;}
    return `<div class="grid-body" style="height:${gridH}px;">${rows}${nowLine}${blocks}</div>`;
  };

  if(citasView==='day'){
    const isToday=ds===todayStr;
    const label=citasDate.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
    document.getElementById('citas-view').innerHTML=`<div style="overflow:auto;max-height:580px;"><div class="cal-wrap"><div class="hour-col">${labels}</div><div class="day-col"><div class="day-hd ${isToday?'today-hd':''}">${label}${isToday?' · Hoy':''}</div>${makeDayBlocks(ds,isToday)}</div></div></div>`;
  } else {
    const mon=new Date(citasDate); mon.setDate(mon.getDate()-((mon.getDay()+6)%7)); mon.setHours(0,0,0,0);
    let dayCols='';
    for(let i=0;i<7;i++){
      const d=new Date(mon); d.setDate(d.getDate()+i);
      const dStr=localDateStr(d); const isToday=dStr===todayStr;
      const label=d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric'});
      dayCols+=`<div class="day-col"><div class="day-hd ${isToday?'today-hd':''}">${label}</div>${makeDayBlocks(dStr,isToday)}</div>`;
    }
    document.getElementById('citas-view').innerHTML=`<div style="overflow:auto;max-height:580px;"><div class="cal-wrap"><div class="hour-col">${labels}</div>${dayCols}</div></div>`;
  }
}

function renderMonthView(todayStr){
  const year=citasDate.getFullYear(),month=citasDate.getMonth();
  const firstDay=new Date(year,month,1);
  const startMon=new Date(firstDay); startMon.setDate(1-((firstDay.getDay()+6)%7));
  const DAYS=['Lu','Ma','Mi','Ju','Vi','Sá','Do'];
  let headers=DAYS.map(d=>`<div class="month-dow">${d}</div>`).join('');
  let cells='';
  for(let i=0;i<42;i++){
    const d=new Date(startMon); d.setDate(d.getDate()+i);
    const dStr=localDateStr(d); const isThisMonth=d.getMonth()===month; const isToday=dStr===todayStr;
    const dayCitas=allCitas.filter(c=>apptLocalDate(c.starts_at)===dStr&&c.status!=='cancelled');
    const pills=dayCitas.slice(0,3).map(c=>{const col=svcColor(c.service);return `<div class="month-appt-pill" style="background:${col}22;color:${col};" onclick="event.stopPropagation();openCitaModal('${c.id}')">${fmtTime(c.starts_at)} ${c.client_name||''}</div>`;}).join('');
    const more=dayCitas.length>3?`<div style="font-size:10px;color:var(--gray);">+${dayCitas.length-3} más</div>`:'';
    cells+=`<div class="month-cell ${!isThisMonth?'other-month':''} ${isToday?'today-cell':''}" onclick="citasDate=new Date(${d.getTime()});setCitasView('day')"><div class="month-num">${d.getDate()}</div>${pills}${more}</div>`;
  }
  document.getElementById('citas-view').innerHTML=`<div class="month-grid">${headers}${cells}</div>`;
}

function renderLeads(){
  const q=document.getElementById('leads-search')?.value.toLowerCase()||'';
  const fi=document.getElementById('leads-intent')?.value||'';
  const fs=document.getElementById('leads-status')?.value||'';
  let filtered=allLeads.filter(l=>{
    if(fi&&l.intent_level!==fi)return false;
    if(fs&&l.status!==fs)return false;
    if(q)return (l.name||'').toLowerCase().includes(q)||(l.phone||'').includes(q)||(l.interest||'').toLowerCase().includes(q);
    return true;
  });
  if(leadsView==='pipeline'){
    const cols=[{key:'new',label:'🆕 Nuevo',color:'#0ea5e9'},{key:'contacted',label:'📞 Contactado',color:'#f59e0b'},{key:'qualified',label:'✅ Cualificado',color:'#22c55e'},{key:'converted',label:'💰 Convertido',color:'#16a34a'}];
    document.getElementById('leads-view').innerHTML=`<div class="pipeline">${cols.map(col=>{
      const items=filtered.filter(l=>l.status===col.key);
      return `<div class="pipe-col"><div class="pipe-col-hd" style="color:${col.color};">${col.label}<span class="pipe-count">${items.length}</span></div>${items.map(l=>`
        <div class="lead-card"><div class="lead-card-name" onclick="openLeadModal('${l.id}')">${l.name||'Sin nombre'}</div>
        <div class="lead-card-svc" onclick="openLeadModal('${l.id}')">${l.interest||'Sin servicio'}</div>
        <div class="lead-card-foot"><span class="intent-${l.intent_level}">${intentEmoji(l.intent_level)}</span><span style="color:var(--gray)">${tiempoRelativo(l.created_at)}</span></div>
        <div style="margin-top:8px;display:flex;gap:6px;">
          ${l.phone?`<a href="https://wa.me/${l.phone.replace(/\D/g,'')}" target="_blank" class="btn-sm" style="background:#25d366;color:#fff;text-decoration:none;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;">💬</a>`:''}
          <button class="btn-sm btn-ghost" style="font-size:12px;padding:4px 10px;" onclick="quickSeguimiento('${l.id}')">📅 Seguimiento</button>
        </div></div>`).join('')}</div>`;
    }).join('')}</div>`;
  } else {
    document.getElementById('leads-view').innerHTML=`<div class="panel-card"><table><thead><tr><th>Nombre</th><th>Teléfono</th><th>Servicio</th><th>Intención</th><th>Estado</th><th>Hace</th><th>Acciones</th></tr></thead><tbody>${filtered.map(l=>`
      <tr><td><strong>${l.name||'—'}</strong></td>
      <td>${l.phone?`<a href="tel:${l.phone}" style="color:var(--acc2)">${l.phone}</a>`:'—'}</td>
      <td>${l.interest||'—'}</td><td class="intent-${l.intent_level}">${intentEmoji(l.intent_level)}</td>
      <td><span class="badge-status s-${l.status}">${statusLead(l.status)}</span></td>
      <td style="color:var(--gray);font-size:12px;">${tiempoRelativo(l.created_at)}</td>
      <td style="display:flex;gap:6px;"><button class="btn-sm btn-ghost" onclick="openLeadModal('${l.id}')">Ver</button><button class="btn-sm btn-acc" onclick="quickLead('${l.id}','contacted')">Contactar</button></td>
      </tr>`).join('')}</tbody></table></div>`;
  }
}

          <div class="modal-field"><label>Seguimiento</label>
            <input type="date" id="m-follow" value="${l.follow_up_date||''}" onchange="saveLeadField('${l.id}','follow_up_date',this.value)"></div>
          <div class="modal-field full"><label>Notas</label>
            <textarea id="m-notes" rows="3" placeholder="Anotaciones del equipo...">${l.notes||''}</textarea></div>
        </div>
        <div class="modal-actions">
          <button class="btn-sm btn-acc" onclick="saveLeadNotes('${l.id}')">💾 Guardar notas</button>
          ${l.phone?`<a href="https://wa.me/${l.phone.replace(/\D/g,'')}" target="_blank" class="btn-sm" style="background:#25d366;color:#fff;text-decoration:none;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;">💬 WhatsApp</a>`:''}
          ${l.phone?`<a href="tel:${l.phone}" class="btn-sm btn-ghost" style="text-decoration:none;padding:6px 14px;">📞 Llamar</a>`:''}
        </div>
      </div>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

async function saveLeadField(id,field,val){
  await _sb.from('leads').update({[field]:val,updated_at:new Date().toISOString()}).eq('id',id);
  await loadAll(); toast('Guardado ✓');
}
async function saveLeadNotes(id){
  const notes=document.getElementById('m-notes')?.value;
  await saveLeadField(id,'notes',notes); closeModal();
}

// ── SEGUIMIENTOS ──────────────────────────────────────────
function renderSeguimientos(){
  const today=localDateStr(new Date());
  const d3=localDateStr(new Date(Date.now()+3*86400000));
  const leads=allLeads.filter(l=>l.follow_up_date&&l.follow_up_date<=d3&&l.status!=='converted'&&l.status!=='lost').sort((a,b)=>a.follow_up_date.localeCompare(b.follow_up_date));
  const venc=leads.filter(l=>l.follow_up_date<today);
  document.getElementById('seg-view').innerHTML=venc.length?`<div class="alert-card"><span class="alert-icon">⚠️</span><span class="alert-txt">${venc.length} seguimiento${venc.length>1?'s':''} vencido${venc.length>1?'s':''} — requieren atención</span></div>`:'';
  const card=document.createElement('div'); card.className='panel-card';
  if(!leads.length){card.innerHTML='<div style="padding:32px;text-align:center;color:var(--gray);">No hay seguimientos próximos 🎉</div>';}
  else{
    card.innerHTML=`<table><thead><tr><th>Nombre</th><th>Servicio</th><th>Seguimiento</th><th>Estado</th><th>Intención</th><th>Acción</th></tr></thead>
      <tbody>${leads.map(l=>{
        const isVenc=l.follow_up_date<today,isHoy=l.follow_up_date===today;
        const tag=isVenc?'<span class="badge">VENCIDO</span>':isHoy?'<span class="badge" style="background:var(--acc2)">HOY</span>':'<span class="badge" style="background:#3b82f6">PRÓXIMO</span>';
        return `<tr><td><strong>${l.name||'—'}</strong><br><span style="font-size:12px;color:var(--gray)">${l.phone||''}</span></td>
          <td>${l.interest||'—'}</td><td>${fmtDate(l.follow_up_date)} ${tag}</td>
          <td><span class="badge-status s-${l.status}">${statusLead(l.status)}</span></td>
          <td class="intent-${l.intent_level}">${intentEmoji(l.intent_level)}</td>
          <td style="display:flex;gap:6px;"><button class="btn-sm btn-acc" onclick="quickLead('${l.id}','contacted')">Contactado</button><button class="btn-sm btn-ghost" onclick="openLeadModal('${l.id}')">Ver</button></td>
        </tr>`;}).join('')}
      </tbody></table>`;
  }
  document.getElementById('seg-view').appendChild(card);
}

// ── NOTIFICACIONES ────────────────────────────────────────
function checkNotifications(){
  const hot=allLeads.filter(l=>l.intent_level==='hot'&&l.status==='new').length;
  const pend=allCitas.filter(c=>c.status==='pending').length;
  document.title=`${hot?`(${hot}🔥) `:''}${pend?`(${pend}📅) `:''}Panel · ${BIZ_NAME}`;
  if(prevHotCount===-1){prevHotCount=hot;prevPendingCount=pend;return;}
  if(hot>prevHotCount) notificar(`${hot-prevHotCount} nuevo lead caliente 🔥`);
  if(pend>prevPendingCount) notificar(`${pend-prevPendingCount} nueva cita pendiente 📅`);
  prevHotCount=hot; prevPendingCount=pend;
}
function notificar(msg){
  try{const ctx=new AudioContext(),t=ctx.currentTime;[520,640,780].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=f;g.gain.setValueAtTime(.12,t+i*.12);g.gain.exponentialRampToValueAtTime(.001,t+i*.12+.18);o.connect(g);g.connect(ctx.destination);o.start(t+i*.12);o.stop(t+i*.12+.18);});}catch(e){}
  if(Notification.permission==='granted') new Notification('Airmate — '+BIZ_NAME,{body:msg,icon:'/logo.png'});
  else if(Notification.permission!=='denied') Notification.requestPermission();
  toast('🔔 '+msg,4000);
}

// ── HELPERS ───────────────────────────────────────────────
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function toast(msg,ms=2500){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),ms);}
function fmtTime(iso){if(!iso)return '—';return new Date(iso).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});}
function fmtDateTime(iso){if(!iso)return '—';return new Date(iso).toLocaleDateString('es-ES',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}
function fmtDate(d){if(!d)return '—';const [y,m,day]=d.split('-');return `${day}/${m}/${y}`;}
function tiempoRelativo(iso){if(!iso)return '—';const s=Math.floor((Date.now()-new Date(iso))/1000);if(s<60)return 'ahora';if(s<3600)return `hace ${Math.floor(s/60)}m`;if(s<86400)return `hace ${Math.floor(s/3600)}h`;return `hace ${Math.floor(s/86400)}d`;}
function intentEmoji(l){return l==='hot'?'🔥 Caliente':l==='warm'?'🌡️ Tibio':'❄️ Frío';}
function statusCita(s){return {pending:'Pendiente',confirmed:'Confirmada',cancelled:'Cancelada',completed:'Completada'}[s]||s;}
function statusLead(s){return {new:'Nuevo',contacted:'Contactado',qualified:'Cualificado',converted:'Convertido',lost:'Perdido'}[s]||s;}
</script>
