          EJ_SVC: service_npmjvvf
          EJ_TPL: template_recordatorio
          EJ_PUB_KEY: i4iBVVP-BkUOOwBE9
          EJ_PRIV_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
